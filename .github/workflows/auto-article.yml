name: 記事の自動生成（週次）

# 毎週月曜 08:00 JST（=前日23:00 UTC）にネタから記事を1本生成してコミット。
# コミットされると deploy.yml が走って自動公開される。
on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:
    inputs:
      topic:
        description: "記事トピック（未指定なら topics.txt から選ぶ）"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: トピックを決定
        id: pick
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            echo "topic=${{ github.event.inputs.topic }}" >> "$GITHUB_OUTPUT"
          else
            # topics.txt からまだ未使用の行を1つ選ぶ（先頭の未処理行）
            TOPIC=$(grep -v '^#' scripts/topics.txt | grep -v '^\s*$' | head -n 1)
            echo "topic=$TOPIC" >> "$GITHUB_OUTPUT"
            # 使ったトピックはコメントアウトして消費済みにする
            sed -i "0,/^$(echo "$TOPIC" | sed 's/[\/&]/\\&/g')$/s//# [done] &/" scripts/topics.txt || true
          fi

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs "${{ steps.pick.outputs.topic }}"

      - name: コミット
        run: |
          git config user.name "article-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/content/articles scripts/topics.txt
          git commit -m "記事を自動生成: ${{ steps.pick.outputs.topic }}" || echo "変更なし"
          git push
